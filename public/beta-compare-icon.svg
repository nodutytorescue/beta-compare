<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Left half - dark -->
    <rect x="0" y="0" width="253" height="512" fill="#1a1a2e"/>
    <!-- Right half - warm -->
    <rect x="259" y="0" width="253" height="512" fill="#e8562a"/>
    <!-- Center gap -->
    <rect x="253" y="0" width="6" height="512" fill="#0d0d18"/>

    <!-- Left: abstract upward path in opposing color -->
    <path
      d="M120,390 Q105,320 130,260 Q150,210 135,160 Q125,125 140,90"
      stroke="#e8562a"
      stroke-width="28"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />

    <!-- Right: different path up in opposing color -->
    <path
      d="M392,390 Q407,310 380,255 Q360,205 375,155 Q385,120 368,85"
      stroke="#1a1a2e"
      stroke-width="28"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />

    <!-- Subtle β at bottom -->
    <text
      x="256"
      y="468"
      font-family="Georgia, serif"
      font-size="48"
      font-weight="bold"
      fill="#ffffff"
      text-anchor="middle"
      opacity="0.4"
    >β</text>
  </g>
</svg>